version: "3.9"

services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minimalapi:
    build:
      context: .
      dockerfile: MinimalApi/Dockerfile
    ports:
      - "8080:8080"
      - "443:443"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  pgdata: